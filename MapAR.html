<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <!-- <script src="https://rawgit.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script> -->
  </head>
  <body>    

    <a-scene mindar-image="imageTargetSrc: https://sneunz.github.io/WebARStuff/FileStorage/ImageTargets/MapTargets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" render-order="mask, main">
      <a-assets>
        <a-asset-item id="part1" src="https://sneunz.github.io/WebARStuff/FileStorage/Part1.glb"></a-asset-item>
        <a-asset-item id="part2" src="https://sneunz.github.io/WebARStuff/FileStorage/Part2.glb"></a-asset-item>
        <a-asset-item id="water" src="https://sneunz.github.io/WebARStuff/FileStorage/WaterPlane.glb"></a-asset-item>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
      <a-entity light="type: ambient; color: #DDD"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 1.6" position="-0.5 1 1"></a-entity>
        <a-gltf-model rotation="90 0 0 " position="0 0 0" scale="0.3 0.3 0.3" src="#part1"></a-gltf-model>
        <a-gltf-model rotation="90 0 0 " position="0 0 0" scale="0.3 0.3 0.3" src="#part2"></a-gltf-model>
        <a-gltf-model rotation="90 0 0 " position="0 0 0" scale="0.3 0.3 0.3" src="#water"></a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
</html>
